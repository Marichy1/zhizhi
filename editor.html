<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜘蜘数据编辑器</title>
    <style>
        :root {
            --bg: #f2f2f2;
            --card: #ffffff;
            --border: #cccccc;
            --accent: #000000;
            --text: #333333;
            --tag-bg: #eeeeee;
        }
        body {
            font-family: "Courier New", Courier, monospace;
            background: var(--bg);
            padding: 20px;
            color: var(--text);
            max-width: 1100px;
            margin: 0 auto;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 6px 14px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { opacity: 0.85; }
        .file-zone {
            background: var(--card);
            border: 2px dashed var(--border);
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }
        .layout {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            align-items: flex-start;
        }
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
        }
        .left-panel { width: 280px; }
        .right-panel { flex: 1; }

        h2 { margin: 0 0 12px 0; font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }

        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
        .tag-badge {
            background: var(--tag-bg);
            border: 1px solid #999;
            border-radius: 10px;
            padding: 4px 10px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .tag-badge .count {
            background: #ddd;
            color: #333;
            border-radius: 8px;
            padding: 0 6px;
            font-size: 11px;
            margin-left: 2px;
        }
        .tag-badge button {
            background: none;
            border: none;
            font-size: 15px;
            color: #c00;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }
        .new-tag-input {
            width: 100px;
            font-family: inherit;
            font-size: 13px;
            padding: 4px;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .stats {
            margin-bottom: 16px;
            font-size: 13px;
            color: #555;
        }
        .stats span { font-weight: bold; }

        .page-card {
            background: var(--card);
            border: 1px solid var(--border);
            margin-bottom: 14px;
            padding: 14px;
            border-radius: 6px;
            position: relative;
        }
        .page-card label {
            display: block;
            font-size: 13px;
            margin-top: 8px;
            color: #555;
        }
        .page-card input, .page-card textarea {
            width: 100%;
            font-family: inherit;
            font-size: 13px;
            padding: 5px;
            border: 1px solid var(--border);
            border-radius: 3px;
            margin-top: 2px;
        }
        .page-card textarea { height: 50px; }

        .tag-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
            margin-top: 6px;
        }
        .tag-selector label {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            font-size: 12px;
            background: var(--tag-bg);
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid #bbb;
            margin: 0;
        }
        .tag-selector.collapsed { display: none; }

        .add-tag-wrapper {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 6px;
        }
        .add-tag-wrapper input {
            width: 100px;
            padding: 4px;
            font-family: inherit;
            font-size: 13px;
        }

        .delete-page-btn {
            background: #c00;
            color: white;
            border: none;
            padding: 4px 12px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .visit-btn {
            background: #333;
            color: white;
            border: none;
            padding: 4px 12px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            font-size: 12px;
            position: absolute;
            top: 10px;
            right: 70px;
        }

        .toolbar {
            margin-bottom: 16px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-input {
            padding: 6px 10px;
            font-family: inherit;
            font-size: 13px;
            border: 1px solid var(--border);
            border-radius: 4px;
            flex: 1;
            min-width: 200px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>蜘蜘数据编辑器</h1>

    <div class="file-zone">
        <input type="file" id="fileInput" accept=".html">
        <p>上传 zhizhi.html 开始编辑</p>
    </div>

    <div class="toolbar">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索页面...">
        <button id="addPageBtn">添加页面（置顶）</button>
        <button id="exportJsonBtn">导出 JSON</button>
        <button id="importJsonBtn">导入 JSON</button>
        <button id="downloadBtn">下载更新后的 html</button>
    </div>
    <input type="file" id="jsonFileInput" accept=".json" style="display:none;">

    <div class="layout">
        <div class="panel left-panel">
            <h2>标签池</h2>
            <div class="stats" id="statsArea"></div>
            <div id="tagPoolList" class="tag-list"></div>
            <div style="margin-top:12px; display:flex; gap:6px;">
                <input type="text" class="new-tag-input" id="newGlobalTagInput" placeholder="新标签">
                <button id="addGlobalTagBtn">添加</button>
            </div>
        </div>

        <div class="panel right-panel">
            <h2>页面列表</h2>
            <div id="pagesContainer"></div>
        </div>
    </div>
</div>

<script>
    let TAG_POOL = [];
    let PAGES = [];
    let originalHTML = '';
    let searchQuery = '';

    // 计算每个标签的页面数量，并按数量降序返回
    function getTagCounts() {
        const counts = {};
        TAG_POOL.forEach(tag => { counts[tag] = 0; });
        PAGES.forEach(page => {
            page.tags.forEach(tag => {
                if (counts[tag] !== undefined) counts[tag]++;
            });
        });
        return Object.entries(counts).sort((a, b) => b[1] - a[1]);
    }

    // 更新统计信息和标签列表
    function renderStatsAndTags() {
        const statsDiv = document.getElementById('statsArea');
        statsDiv.innerHTML = `页面总数：<span>${PAGES.length}</span>`;

        const tagCounts = getTagCounts();
        const list = document.getElementById('tagPoolList');
        list.innerHTML = tagCounts.map(([tag, count]) => `
            <span class="tag-badge">
                ${esc(tag)} <span class="count">${count}</span>
                <button data-tag="${esc(tag)}">×</button>
            </span>
        `).join('');
        list.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                const tag = btn.dataset.tag;
                if (confirm(`删除标签 "${tag}" 吗？将从所有页面中移除。`)) {
                    TAG_POOL = TAG_POOL.filter(t => t !== tag);
                    PAGES.forEach(p => p.tags = p.tags.filter(t => t !== tag));
                    renderAll();
                }
            });
        });
    }

    // 页面搜索过滤
    function filterPages() {
        if (!searchQuery.trim()) return PAGES;
        const q = searchQuery.trim().toLowerCase();
        return PAGES.filter(page => {
            return (page.name && page.name.toLowerCase().includes(q)) ||
                   (page.desc && page.desc.toLowerCase().includes(q)) ||
                   (page.url && page.url.toLowerCase().includes(q)) ||
                   (page.tags && page.tags.some(tag => tag.toLowerCase().includes(q)));
        });
    }

    // 搜索输入框事件
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderPages();
    });

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            originalHTML = ev.target.result;
            extractData(originalHTML);
            renderAll();
        };
        reader.readAsText(file);
    });

    function extractData(html) {
        const poolMatch = html.match(/const TAG_POOL = (\[.*?\]);/);
        TAG_POOL = poolMatch ? eval(poolMatch[1]) : [];
        const pagesMatch = html.match(/const PAGES = (\[[\s\S]*?\]);/);
        if (pagesMatch) {
            PAGES = eval(pagesMatch[1]);
        } else {
            const dataMatch = html.match(/const DATA = (\{[\s\S]*?\});/);
            if (dataMatch) {
                const data = eval('(' + dataMatch[1] + ')');
                PAGES = [];
                for (let [tag, pages] of Object.entries(data)) {
                    pages.forEach(p => {
                        const existing = PAGES.find(x => x.name === p.name && x.url === p.url);
                        if (existing) {
                            if (!existing.tags.includes(tag)) existing.tags.push(tag);
                        } else {
                            PAGES.push({ ...p, tags: [tag] });
                        }
                    });
                }
            } else {
                PAGES = [];
            }
        }
        PAGES.forEach(p => { if (!p.img) p.img = 'auto'; });
    }

    function renderAll() {
        renderStatsAndTags();
        renderPages();
    }

    document.getElementById('addGlobalTagBtn').addEventListener('click', () => {
        const input = document.getElementById('newGlobalTagInput');
        let val = input.value.trim();
        if (!val) return;
        if (!val.startsWith('#')) val = '#' + val;
        if (TAG_POOL.includes(val)) { alert('标签已存在'); return; }
        TAG_POOL.push(val);
        renderAll();
        input.value = '';
    });

    function renderPages() {
        const container = document.getElementById('pagesContainer');
        container.innerHTML = '';
        const filtered = filterPages();
        filtered.forEach((page, filteredIdx) => {
            // 找到该页面在原始 PAGES 中的索引，用于后续修改
            const idx = PAGES.indexOf(page);
            const card = document.createElement('div');
            card.className = 'page-card';
            card.innerHTML = `
                <button class="delete-page-btn">删除</button>
                <button class="visit-btn">访问</button>
                <label>名称 <input class="name" value="${esc(page.name)}"></label>
                <label>简介 <textarea class="desc">${esc(page.desc)}</textarea></label>
                <label>图片 (auto / placeholder / URL) <input class="img" value="${esc(page.img)}"></label>
                <label>链接 <input class="url" value="${esc(page.url)}"></label>
                <label>标签</label>
                <div class="add-tag-wrapper">
                    <input class="new-page-tag" placeholder="输入标签后回车">
                    <button class="toggle-select-btn">展开标签</button>
                </div>
                <div class="tag-selector collapsed" data-idx="${idx}"></div>
            `;
            container.appendChild(card);

            const nameInput = card.querySelector('.name');
            const descInput = card.querySelector('.desc');
            const imgInput = card.querySelector('.img');
            const urlInput = card.querySelector('.url');
            nameInput.addEventListener('input', () => { page.name = nameInput.value; });
            descInput.addEventListener('input', () => { page.desc = descInput.value; });
            imgInput.addEventListener('input', () => { page.img = imgInput.value || 'auto'; });
            urlInput.addEventListener('input', () => { page.url = urlInput.value; });

            // 访问按钮
            card.querySelector('.visit-btn').addEventListener('click', () => {
                if (page.url) {
                    window.open(page.url, '_blank');
                } else {
                    alert('链接为空');
                }
            });

            card.querySelector('.delete-page-btn').addEventListener('click', () => {
                if (confirm('删除此页面？')) {
                    PAGES.splice(idx, 1);
                    renderAll();
                }
            });

            const selectorDiv = card.querySelector('.tag-selector');
            renderTagCheckboxes(selectorDiv, idx, page);

            const toggleBtn = card.querySelector('.toggle-select-btn');
            toggleBtn.addEventListener('click', () => {
                const collapsed = selectorDiv.classList.contains('collapsed');
                if (collapsed) {
                    selectorDiv.classList.remove('collapsed');
                    toggleBtn.textContent = '收起标签';
                } else {
                    selectorDiv.classList.add('collapsed');
                    toggleBtn.textContent = '展开标签';
                }
            });

            const newTagInput = card.querySelector('.new-page-tag');
            newTagInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    let val = newTagInput.value.trim();
                    if (!val) return;
                    if (!val.startsWith('#')) val = '#' + val;
                    if (!TAG_POOL.includes(val)) {
                        TAG_POOL.push(val);
                        renderStatsAndTags();
                    }
                    if (!page.tags.includes(val)) {
                        page.tags.push(val);
                        renderTagCheckboxes(selectorDiv, idx, page);
                        renderStatsAndTags();
                    }
                    newTagInput.value = '';
                }
            });
        });
    }

    function renderTagCheckboxes(container, pageIdx, page) {
        container.innerHTML = '';
        TAG_POOL.forEach(tag => {
            const label = document.createElement('label');
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.checked = page.tags.includes(tag);
            cb.addEventListener('change', () => {
                if (cb.checked) {
                    if (!page.tags.includes(tag)) page.tags.push(tag);
                } else {
                    page.tags = page.tags.filter(t => t !== tag);
                }
                renderStatsAndTags();
            });
            label.appendChild(cb);
            label.appendChild(document.createTextNode(tag));
            container.appendChild(label);
        });
    }

    // 添加页面（置顶）
    document.getElementById('addPageBtn').addEventListener('click', () => {
        PAGES.unshift({ name: '', desc: '', img: 'auto', url: '', tags: [] });
        renderAll();
    });

    // 导出 JSON
    document.getElementById('exportJsonBtn').addEventListener('click', () => {
        const jsonStr = JSON.stringify(PAGES, null, 2);
        const blob = new Blob([jsonStr], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'zhizhi_data.json';
        a.click();
    });

    // 导入 JSON
    document.getElementById('importJsonBtn').addEventListener('click', () => {
        document.getElementById('jsonFileInput').click();
    });

    document.getElementById('jsonFileInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const imported = JSON.parse(ev.target.result);
                if (!Array.isArray(imported)) throw new Error('JSON 必须是一个数组');
                // 确保每个页面有 img
                imported.forEach(p => { if (!p.img) p.img = 'auto'; });
                PAGES = imported;
                // 从所有页面标签中重建标签池（保留原有顺序可能丢失，直接收集）
                const tagSet = new Set();
                PAGES.forEach(p => p.tags.forEach(t => tagSet.add(t)));
                TAG_POOL = Array.from(tagSet).sort();
                renderAll();
            } catch (err) {
                alert('导入失败：' + err.message);
            }
        };
        reader.readAsText(file);
        e.target.value = ''; // 允许重复导入同一文件
    });

    // 下载更新后的 HTML
    document.getElementById('downloadBtn').addEventListener('click', () => {
        if (!originalHTML) { alert('请先上传 zhizhi.html 文件'); return; }
        let newHTML = originalHTML;
        newHTML = newHTML.replace(/const TAG_POOL = \[.*?\];/, `const TAG_POOL = ${JSON.stringify(TAG_POOL)};`);
        newHTML = newHTML.replace(/const PAGES = \[[\s\S]*?\];/, `const PAGES = ${JSON.stringify(PAGES, null, 4)};`);
        newHTML = newHTML.replace(/const DATA = \{[\s\S]*?\};/g, '// 旧数据已移除');
        const blob = new Blob([newHTML], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'zhizhi_updated.html';
        a.click();
    });

    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
